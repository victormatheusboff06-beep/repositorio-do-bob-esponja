<html lang="pt-br">
    <head>
        <meta charset="UTF-8">

                <label for="nome">Nome:</label>

                <input type="email" id="email" name="email">
            </div>

                <input type="password" id="confirmar-senha" name="confirmar-senha">
            </div>
            <button>
                Cadastrar
            </button>
            
        </form>
    </body>
